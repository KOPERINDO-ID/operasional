<!DOCTYPE html>
<html class="theme-dark">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src * 'self' 'unsafe-inline' 'unsafe-eval' data: gap: content:">
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, minimal-ui, viewport-fit=cover">
  <meta name="theme-color" content="#007aff">
  <meta name="format-detection" content="telephone=no">
  <meta name="msapplication-tap-highlight" content="no">
  <title>Admin</title>
  <link rel="stylesheet" href="framework7/css/framework7.bundle.min.css">
  <link rel="stylesheet" href="css/icons.css">
  <link rel="shortcut icon" href="#" />
  <link rel="stylesheet" href="css/lib/chart.min.css">
  <link rel="stylesheet" href="css/app.css">
  <style type="text/css">
    .kotak {
      border: solid 1px white;
      width: 22px;
      height: 22px;
    }
  </style>
</head>

<body class="theme-dark">
  <div id="app">
    <div id="view-home" class="view view-main view-init safe-areas section-main">
      <div class="navbar">
        <div class="navbar-bg"></div>
        <div class="navbar-inner bg-dark-gray-medium">
          <div class="kotak" id="box_internet" style="float:right;margin-left:5px;">
            <div class="title" id="title-nama" style="margin-left:30px;">Admin</div>

          </div>
          <div class="popup popup-pengumuman">
            <div class="view">
              <div class="page">
                <div class="navbar">
                  <div class="navbar-bg"></div>
                  <div class="navbar-inner">
                    <div class="title">Info</div>
                    <div class="right">
                      <!-- Link to close popup -->
                      <a class="link popup-close">Close</a>
                    </div>
                  </div>
                </div>
                <div class="page-content">
                  <div class="card card-outline margin-top table-color-lightgray">
                    <div class="card-content">
                      <div class="row">
                        <div class="col-100" id="data_pengumuman">
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="popup popup-pengajuan">
            <div class="view">
              <div class="page">
                <div class="navbar">
                  <div class="navbar-bg"></div>
                  <div class="navbar-inner">
                    <div class="title">Pengajuan</div>
                    <div class="right">
                      <!-- Link to close popup -->
                      <a class="link popup-close">Close</a>
                    </div>
                  </div>
                </div>
                <div class="page-content">
                  <div class="card card-outline margin-top">
                    <div class="card-content">
                      <div class="row">
                        <div class="col-100">
                          <div class="card-content" style="overflow-x:auto;width:100%;">
                            <table cellspacing="1" cellpadding="1" width="750px">
                              <thead class="bg-dark-gray-medium text-align-center">
                                <th class="label-cell" width="5%" style="border-bottom:1px solid gray;">No</th>
                                <th class="label-cell" width="17%" style="border-bottom:1px solid gray;">Tanggal</th>
                                <th class="label-cell" width="18%" style="border-bottom:1px solid gray;">Kategori</th>
                                <th class="label-cell" width="33%" style="border-bottom:1px solid gray;">Keterangan
                                </th>
                                <th class="label-cell" width="17%" style="border-bottom:1px solid gray;">Nominal</th>
                                <th class="label-cell" width="10%" style="border-bottom:1px solid gray;">
                                  Opsi</th>
                              </thead>
                              <tbody id="data_pengajuan">
                              </tbody>
                            </table>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <audio id="reminder-audio" preload="auto">
            <source src="img/sound/audio.mp3" type="audio/mpeg">
            <source src="img/sound/audio.ogg" type="audio/ogg">
            <source src="img/sound/audio.wav" type="audio/wav">
          </audio>
          <!-- <div style="color:#dcdcdcfa; font-size:14px; padding:8px; float:right;" class="right" id="clock_view"></div> -->
          <div style="color:#dcdcdcfa; font-size:14px; padding:8px; float:right;" class="right">
            <div style="width:45px;cursor: pointer;" id="pengajuan_logo" data-popup=".popup-pengajuan"
              class="popup-open"><i class="f7-icons">tray_full_fill<span
                  style="left:18% !important;margin-top: 20px !important;" class="badge color-red"
                  id="count_pengajuan"></span></i></div>
            <div style="width:45px;cursor: pointer;" id="pengumuman_logo" data-popup=".popup-pengumuman"
              class="popup-open"><i class="f7-icons">bell<span style="left:16% !important;margin-top: 20px !important;"
                  class="badge color-red" id="count_pengumuman"></span></i></div>
            <div style="color:#dcdcdcfa; font-size:14px; padding:8px; float:right;" id="clock_view"></div>
            <img onclick="logOut();" id="logout_logo" src="img/logo/logout.png" style="width:45px;cursor: pointer;" />
          </div>

        </div>
      </div>
    </div>
  </div>
  <!-- CORDOVA_PLACEHOLDER_DONT_REMOVE -->
  <!-- Framework7 library -->
  <!-- Cordova APIs -->
  <script src="js/cordova-app.js"></script>


  <!-- End Cordova APIs -->

  <!-- App routes -->
  <script src="js/routes.js"></script>
  <!-- End App routes -->

  <!-- App scripts -->

  <script src="js/lib/jquery-2.1.3.min.js"></script>
  <script src="js/lib/chart.bundle.min.js"></script>
  <script type="text/javascript" charset="utf-8" src="cordova.js"></script>

  <script src="framework7/js/framework7.bundle.min.js"></script>
  <!-- End App scripts -->

  <!-- Page Additional JS -->
  <script src="js/global.js"></script>
  <script src="js/login.js"></script>
  <script src="js/additional/jquery.mask.min.js"></script>
  <script src="js/main.js"></script>
  <script src="js/data.js"></script>
  <script src="js/data_kas.js"></script>
  <script src="js/neraca.js"></script>
  <script src="js/master.js"></script>
  <script src="js/master_expedisi.js"></script>
  <script src="js/master_kas.js"></script>
  <script src="js/additional/moment/moment.js"></script>
  <script src="js/additional/download.js"></script>
  <!-- End Additional JS -->

  <!-- App Global JS -->
  <script src="js/app.js"></script>

  <!-- End App Global JS -->

</body>

</html>
